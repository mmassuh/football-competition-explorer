<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tournaments 2026 — Review</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3347;
  --text:#e8eaf0;--text2:#8b90a8;--text3:#555a72;
  --blue:#3b82f6;--blue-bg:#1e2d4a;
  --green:#22c55e;--green-bg:#122a1e;
  --amber:#f59e0b;--amber-bg:#2a1f0a;
  --r:10px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;padding:16px;padding-bottom:110px}
h1{font-size:18px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:16px}
.top-note{background:#2a1a0a;border:1px solid #f59e0b;border-left:4px solid #f59e0b;border-radius:var(--r);padding:12px 14px;margin-bottom:20px;font-size:13px;color:#fcd34d;line-height:1.5}
.top-note .warn-title{font-size:12px;font-weight:700;letter-spacing:.06em;color:#f59e0b;margin-bottom:4px}
.top-note strong{color:#fef3c7}
.section-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:20px 0 8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card.user-added{border-left:3px solid var(--blue)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.card-name-row{display:flex;align-items:center;gap:8px;min-width:0}
.card-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.t-flag{font-size:20px;line-height:1;flex-shrink:0}
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge-ok{background:var(--green-bg);color:var(--green)}
.badge-warn{background:var(--amber-bg);color:var(--amber)}
.badge-user{background:var(--blue-bg);color:var(--blue)}
.card-meta{font-size:12px;color:var(--text2);margin-bottom:8px}
.card-desc{font-size:12px;color:var(--text2);line-height:1.5;border-top:1px solid var(--border);padding-top:8px;margin-bottom:10px}
.comments-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.comment{background:var(--surface2);border-radius:8px;padding:9px 11px;font-size:13px;line-height:1.5}
.comment-author{font-weight:600;font-size:11px;margin-bottom:3px;color:var(--blue)}
.comment-text{color:var(--text)}
.no-comments{font-size:12px;color:var(--text3);font-style:italic;margin-bottom:8px}
.toggle-btn{font-size:12px;color:var(--text2);background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;width:100%;text-align:left;display:flex;align-items:center;gap:6px}
.comment-form{display:flex;flex-direction:column;gap:8px;margin-top:4px}
textarea,input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
textarea{resize:none;min-height:70px}
textarea:focus,input[type=text]:focus{border-color:var(--blue)}
.submit-comment{align-self:flex-end;padding:8px 16px;font-size:13px;font-weight:500;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer}
.name-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:20px}
.name-section label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px}
.legend{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:20px;display:flex;flex-direction:column;gap:10px}
.legend-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.legend-row{display:flex;align-items:flex-start;gap:10px}
.legend-row .badge{flex-shrink:0;margin-top:1px}
.legend-desc{font-size:12px;color:var(--text2);line-height:1.5}
.add-tournament-card{border:1px dashed var(--border);border-radius:var(--r);padding:14px;margin-top:24px;margin-bottom:10px}
.add-tournament-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.add-form{display:flex;flex-direction:column;gap:10px}
.field-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;appearance:none}
.fit-hint{font-size:11px;color:var(--text3);line-height:1.6;margin-top:6px}
.fit-hint strong{color:var(--text2)}
.add-btn{width:100%;padding:11px;font-size:14px;font-weight:500;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer}
.submit-section{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:14px 16px;display:flex;flex-direction:column;gap:6px}
.submit-all{width:100%;padding:14px;font-size:15px;font-weight:600;background:var(--blue);color:#fff;border:none;border-radius:var(--r);cursor:pointer}
.submit-hint{font-size:12px;color:var(--text3);text-align:center}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1}

/* ADMIN */
.admin-header{margin-bottom:20px}
.admin-header h1{font-size:20px;margin-bottom:4px}
.paste-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:20px}
.paste-box label{font-size:12px;color:var(--text2);display:block;margin-bottom:8px}
.paste-box textarea{min-height:90px;font-size:12px}
.parse-btn{margin-top:8px;width:100%;padding:11px;font-size:14px;font-weight:500;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer}
.reviewer-chip{display:inline-flex;align-items:center;gap:6px;background:var(--blue-bg);border:1px solid var(--blue);color:var(--blue);font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;margin:0 6px 6px 0}
.reviewers-row{margin-bottom:16px;display:flex;flex-wrap:wrap}
.admin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.admin-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.admin-card-name{font-size:14px;font-weight:600;color:var(--text)}
.admin-comment{background:var(--surface2);border-radius:8px;padding:9px 11px;font-size:13px;margin-bottom:6px}
.admin-comment-author{font-size:11px;font-weight:600;color:var(--blue);margin-bottom:2px}
.suggested-tag{font-size:11px;background:var(--blue-bg);color:var(--blue);padding:2px 8px;border-radius:20px;margin-left:6px}
.empty-admin{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'tournaments-review-v3';

const defaultTournaments = [
  {id:'brasileirao',month:'July',name:'Brasileirão Serie A 2026',type:'ok',meta:'Resumes Jul 16–22 · Single table · 20 teams',desc:'Paused for the World Cup since May. Full season ends Dec 2. Groups view works as-is.',flag:'🇧🇷'},
  {id:'mls',month:'July',name:'MLS 2026',type:'warn',meta:'Resumes Jul 16–17 · 2 conferences',desc:'Regular season table works fine. Playoffs use a custom conference bracket — needs extra work.',flag:'🇺🇸'},
  {id:'sudamericana',month:'July',name:'Copa Sudamericana 2026',type:'ok',meta:'Jul 21 — Round of 16 · Knockout only',desc:'Group stage finished. Knockout bracket works perfectly from R16 to final.',flag:'🏆'},
  {id:'betplay',month:'July',name:'Liga BetPlay Colombia — Clausura',type:'ok',meta:'Jul 24 → Nov · 2 groups of 10',desc:'Two groups of 10, then cuadrangulares (2 groups of 4), then a two-legged final. All phases fit the current app.',flag:'🇨🇴'},
  {id:'libertadores',month:'August',name:'Copa Libertadores 2026',type:'ok',meta:'Aug 11 — Round of 16 · Knockout only',desc:'Biggest club tournament in LATAM. Group stage done — only knockouts remain. Bracket view works perfectly.',flag:'🏆'},
  {id:'argentina',month:'August',name:'Liga Profesional Argentina — Clausura',type:'ok',meta:'~Aug (TBD) · Single table · 28 teams',desc:'Date not yet confirmed. One big table, no knockout. Groups view works as-is.',flag:'🇦🇷'},
  {id:'laliga',month:'August',name:'La Liga 2026–27',type:'ok',meta:'Aug 15–16 · Single table · 20 teams',desc:'Huge LATAM audience (Mbappé, Vinicius, etc.). Standard single table — no changes needed.',flag:'🇪🇸'},
  {id:'premier',month:'August',name:'Premier League 2026–27',type:'ok',meta:'Aug 21 · Single table · 20 teams',desc:'Starts one week later than usual — post-World Cup recovery. No changes needed.',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
  {id:'seriea',month:'August',name:'Serie A 2026–27',type:'ok',meta:'Aug 22–23 · Single table · 20 teams',desc:'Strong LATAM following. Standard table, no changes needed.',flag:'🇮🇹'},
  {id:'ligue1',month:'August',name:'Ligue 1 2026–27',type:'ok',meta:'Aug 23 · Single table · 18 teams',desc:'Lower LATAM interest but worth including. Standard table.',flag:'🇫🇷'},
  {id:'ucl',month:'September',name:'UEFA Champions League 2026–27',type:'warn',meta:'Sep 8 — league phase · 36-team table + knockout',desc:'New format: 36 clubs in one big table (8 games each), then R16 knockout. Needs adjustments for 36 teams.',flag:'🏆'},
];

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#dc2626' : '#22c55e';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

const isAdmin = location.search.includes('admin');

if(isAdmin) {
  renderAdmin();
} else {
  renderReviewer();
}

/* ── REVIEWER ─────────────────────────────────────── */
function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if(s) return JSON.parse(s); } catch(e){}
  const s = { tournaments: JSON.parse(JSON.stringify(defaultTournaments)), comments: {}, openForms: {} };
  defaultTournaments.forEach(t => { s.comments[t.id] = []; s.openForms[t.id] = false; });
  return s;
}
function saveState(state) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){} }

function renderReviewer() {
  let state = loadState();

  document.getElementById('app').innerHTML = `
    <h1>Tournaments 2026</h1>
    <p class="subtitle">Read, comment, and suggest missing competitions.</p>
    <div class="name-section">
      <label>Your name (so we know who said what)</label>
      <input type="text" id="reviewer-name" placeholder="e.g. Martín" maxlength="30" />
    </div>
    <div class="top-note">
      <div class="warn-title">⚠ IMPORTANT — ACTION REQUIRED</div>
      Build a <strong>tournament navigator</strong> so users can switch between competitions inside the app. This is missing before we can support any tournament beyond World Cup 2026.
    </div>
    <div class="legend">
      <div class="legend-title">Status guide</div>
      <div class="legend-row"><span class="badge badge-ok">✅ Ready</span><span class="legend-desc">The app already supports this format. No extra dev needed.</span></div>
      <div class="legend-row"><span class="badge badge-warn">⚠️ Needs work</span><span class="legend-desc">Custom format we don't support yet — extra dev required.</span></div>
    </div>
    <div id="t-list"></div>
    <div class="add-tournament-card">
      <div class="add-tournament-title"><i class="ti ti-plus"></i> Suggest a competition</div>
      <div class="add-form">
        <div><div class="field-label">Competition name</div><input type="text" id="new-name" placeholder="e.g. Eredivisie 2026–27" /></div>
        <div class="row2">
          <div><div class="field-label">Start date</div><input type="text" id="new-date" placeholder="e.g. Aug 9" /></div>
          <div>
            <div class="field-label">App fit</div>
            <select id="new-fit">
              <option value="ok">✅ Ready — no dev needed</option>
              <option value="warn">⚠️ Needs work — custom format</option>
            </select>
            <div class="fit-hint"><strong>✅ Ready:</strong> standard table or knockout — app supports it.<br><strong>⚠️ Needs work:</strong> custom format, extra dev needed.</div>
          </div>
        </div>
        <div><div class="field-label">Note (optional)</div><input type="text" id="new-note" placeholder="Format, audience, anything relevant..." /></div>
        <button class="add-btn" id="add-btn"><i class="ti ti-plus"></i> Add competition</button>
      </div>
    </div>
    <div class="submit-section">
      <button class="submit-all" id="submit-btn"><i class="ti ti-send"></i> Submit my comments</button>
      <div class="submit-hint">Generates a link — paste it in the Google Chat thread</div>
    </div>
  `;

  function getName() { return document.getElementById('reviewer-name').value.trim() || 'Anonymous'; }

  function renderList() {
    const container = document.getElementById('t-list');
    let html = '', lastMonth = '';
    state.tournaments.forEach(t => {
      if(t.month !== lastMonth) { html += `<div class="section-label">${esc(t.month)}</div>`; lastMonth = t.month; }
      const cs = state.comments[t.id] || [];
      const commentsHtml = cs.length === 0
        ? `<div class="no-comments">No comments yet</div>`
        : cs.map(c => `<div class="comment"><div class="comment-author">${esc(c.author)}</div><div class="comment-text">${esc(c.text)}</div></div>`).join('');
      const badgeCls = t.userAdded ? 'badge-user' : (t.type === 'ok' ? 'badge-ok' : 'badge-warn');
      const badgeLabel = t.userAdded ? '➕ Suggested' : (t.type === 'ok' ? '✅ Ready' : '⚠️ Needs work');
      const iconHtml = t.flag ? `<span class="t-flag">${t.flag}</span>` : '';
      const formHtml = state.openForms[t.id]
        ? `<div class="comment-form"><textarea id="ta-${t.id}" placeholder="Your comment..."></textarea><button class="submit-comment" data-id="${t.id}">Add comment</button></div>`
        : `<button class="toggle-btn" data-toggle="${t.id}"><i class="ti ti-message-circle"></i> Add comment</button>`;
      html += `<div class="card${t.userAdded?' user-added':''}">
        <div class="card-header"><div class="card-name-row">${iconHtml}<span class="card-name">${esc(t.name)}</span></div><span class="badge ${badgeCls}">${badgeLabel}</span></div>
        <div class="card-meta">${esc(t.meta)}</div>
        <div class="card-desc">${esc(t.desc)}</div>
        <div class="comments-list">${commentsHtml}</div>
        ${formHtml}
      </div>`;
    });
    container.innerHTML = html;

    container.querySelectorAll('[data-toggle]').forEach(btn => {
      btn.onclick = () => { state.openForms[btn.dataset.toggle] = true; saveState(state); renderList(); setTimeout(()=>{ const el=document.getElementById('ta-'+btn.dataset.toggle); if(el)el.focus(); },50); };
    });
    container.querySelectorAll('.submit-comment').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id;
        const el = document.getElementById('ta-'+id);
        const text = el ? el.value.trim() : '';
        if(!text) return;
        if(!state.comments[id]) state.comments[id] = [];
        state.comments[id].push({ author: getName(), text, ts: new Date().toISOString() });
        state.openForms[id] = false;
        saveState(state);
        renderList();
      };
    });
  }

  renderList();

  document.getElementById('add-btn').onclick = () => {
    const name = document.getElementById('new-name').value.trim();
    if(!name) { showToast('Add a competition name first', true); return; }
    const id = 'user-'+Date.now();
    state.tournaments.push({ id, month:'Suggested by '+getName(), name, type:document.getElementById('new-fit').value, meta:document.getElementById('new-date').value.trim()||'Date TBD', desc:document.getElementById('new-note').value.trim()||'—', userAdded:true, flag:'➕' });
    state.comments[id] = [];
    state.openForms[id] = false;
    document.getElementById('new-name').value='';
    document.getElementById('new-date').value='';
    document.getElementById('new-note').value='';
    saveState(state);
    renderList();
    showToast('Competition added!');
  };

  document.getElementById('submit-btn').onclick = () => {
    const name = getName();
    const comments = {};
    const suggested = [];
    let hasContent = false;

    state.tournaments.forEach(t => {
      const cs = (state.comments[t.id]||[]).filter(c=>c.author===name);
      if(cs.length) { comments[t.id] = cs.map(c=>c.text); hasContent = true; }
      if(t.userAdded) { suggested.push({name:t.name,meta:t.meta,desc:t.desc,by:name}); hasContent = true; }
    });

    if(!hasContent) { showToast('No comments yet — add some first!', true); return; }

    const payload = btoa(unescape(encodeURIComponent(JSON.stringify({ name, comments, suggested, ts: new Date().toISOString() }))));
    const url = location.origin + location.pathname + '?admin#r=' + payload;

    if(navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(()=> showToast('Link copied! Paste it in Google Chat'));
    } else {
      const ta = document.createElement('textarea');
      ta.value = url; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      showToast('Link copied! Paste it in Google Chat');
    }
  };
}

/* ── ADMIN ────────────────────────────────────────── */
function renderAdmin() {
  document.title = 'Tournaments 2026 — Admin';

  const reviews = [];

  if(location.hash.startsWith('#r=')) {
    try {
      const data = JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(3)))));
      reviews.push(data);
    } catch(e){}
  }

  function render() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="admin-header">
        <h1>Results panel</h1>
        <p class="subtitle">Paste review links from Google Chat to see everyone's feedback.</p>
      </div>
      <div class="paste-box">
        <label>Paste review links here (one per line)</label>
        <textarea id="paste-area" placeholder="https://mmassuh.github.io/football-competition-explorer/tournaments-review.html?admin#r=..."></textarea>
        <button class="parse-btn" id="parse-btn"><i class="ti ti-download"></i> Load reviews</button>
      </div>
      ${reviews.length === 0 ? `<div class="empty-admin"><i class="ti ti-inbox" style="font-size:40px;display:block;margin-bottom:12px;opacity:.3"></i>No reviews yet.<br>Paste links above to load them.</div>` : renderResults()}
    `;

    document.getElementById('parse-btn').onclick = () => {
      const lines = document.getElementById('paste-area').value.split('\n').map(l=>l.trim()).filter(Boolean);
      let added = 0;
      lines.forEach(line => {
        try {
          const hash = new URL(line).hash;
          if(!hash.startsWith('#r=')) return;
          const data = JSON.parse(decodeURIComponent(escape(atob(hash.slice(3)))));
          if(!reviews.find(r=>r.name===data.name && r.ts===data.ts)) { reviews.push(data); added++; }
        } catch(e){}
      });
      if(added) { showToast(`Loaded ${added} review${added>1?'s':''}!`); render(); }
      else showToast('No valid links found', true);
    };
  }

  function renderResults() {
    const reviewerChips = reviews.map(r=>`<span class="reviewer-chip"><i class="ti ti-user" style="font-size:12px"></i>${esc(r.name)}</span>`).join('');

    const byTournament = {};
    defaultTournaments.forEach(t => { byTournament[t.id] = { t, comments: [] }; });

    const allSuggested = [];

    reviews.forEach(r => {
      Object.entries(r.comments||{}).forEach(([id, texts]) => {
        if(!byTournament[id]) byTournament[id] = { t: defaultTournaments.find(t=>t.id===id)||{id,name:id,flag:'🏆'}, comments: [] };
        texts.forEach(text => byTournament[id].comments.push({ author: r.name, text }));
      });
      (r.suggested||[]).forEach(s => allSuggested.push({ ...s, by: r.name }));
    });

    const withComments = Object.values(byTournament).filter(x=>x.comments.length>0);
    let html = `<div class="reviewers-row">${reviewerChips}</div>`;

    if(withComments.length === 0 && allSuggested.length === 0) {
      html += `<div class="empty-admin" style="padding:20px">No comments or suggestions in these reviews.</div>`;
      return html;
    }

    let lastMonth = '';
    withComments.forEach(({t, comments}) => {
      const month = defaultTournaments.find(x=>x.id===t.id)?.month || 'Other';
      if(month !== lastMonth) { html += `<div class="section-label">${esc(month)}</div>`; lastMonth = month; }
      const iconHtml = t.flag ? `<span class="t-flag">${t.flag}</span>` : '';
      const commentsHtml = comments.map(c=>`<div class="admin-comment"><div class="admin-comment-author">${esc(c.author)}</div><div class="comment-text">${esc(c.text)}</div></div>`).join('');
      html += `<div class="admin-card"><div class="admin-card-header">${iconHtml}<span class="admin-card-name">${esc(t.name||t.id)}</span></div>${commentsHtml}</div>`;
    });

    if(allSuggested.length > 0) {
      html += `<div class="section-label">Suggested competitions</div>`;
      allSuggested.forEach(s => {
        html += `<div class="admin-card"><div class="admin-card-header"><span class="t-flag">➕</span><span class="admin-card-name">${esc(s.name)}<span class="suggested-tag">by ${esc(s.by)}</span></span></div>
          <div class="card-meta" style="font-size:12px;color:var(--text2)">${esc(s.meta)}</div>
          ${s.desc&&s.desc!=='—'?`<div class="card-desc" style="margin-top:6px">${esc(s.desc)}</div>`:''}
        </div>`;
      });
    }

    return html;
  }

  render();
}
</script>
</body>
</html>
